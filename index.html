<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asian WMO Weather Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            font-family: Arial, sans-serif;
        }
        #map { 
            width: 100vw; 
            height: 100vh; 
            z-index: 1; /* Keep map behind UI */
        }
        
        /* Custom UI Container */
        .ui-container {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000; /* Keep UI above map */
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }

        /* Buttons */
        .custom-btn {
            background-color: white;
            color: #333;
            border: 2px solid #ccc;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            width: 150px;
            text-align: left;
            display: flex;
            justify-content: space-between;
        }
        .custom-btn:hover {
            background-color: #f4f4f4;
        }

        /* Dropdown Panels */
        .menu-panel {
            display: none; /* Hidden by default */
            background: white;
            padding: 12px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
            width: 160px;
            max-height: 400px;
            overflow-y: auto;
        }
        .menu-panel label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        .menu-panel label:last-child {
            margin-bottom: 0;
        }

        /* Popup Styling */
        .popup-content h3 { margin: 0 0 5px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        .popup-content p { margin: 4px 0; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-container">
        
        <div>
            <button id="btn-basemap" class="custom-btn">Base Map <span>▼</span></button>
            <div id="menu-basemap" class="menu-panel">
                <label><input type="radio" name="basemap" value="night" checked> Night Mode</label>
                <label><input type="radio" name="basemap" value="ocean"> Blue Ocean</label>
                <label><input type="radio" name="basemap" value="satellite"> Satellite</label>
            </div>
        </div>

        <div>
            <button id="btn-country" class="custom-btn">Country List <span>▼</span></button>
            <div id="menu-country" class="menu-panel">
                <label><input type="checkbox" class="country-toggle" value="Myanmar"> Myanmar (3)</label>
                <label><input type="checkbox" class="country-toggle" value="Laos"> Laos (3)</label>
                <label><input type="checkbox" class="country-toggle" value="Thailand"> Thailand (5)</label>
                <label><input type="checkbox" class="country-toggle" value="Vietnam"> Vietnam (3)</label>
                <label><input type="checkbox" class="country-toggle" value="Cambodia"> Cambodia (3)</label>
                <label><input type="checkbox" class="country-toggle" value="Malaysia"> Malaysia (15)</label>
                <label><input type="checkbox" class="country-toggle" value="Singapore"> Singapore (5)</label>
                <label><input type="checkbox" class="country-toggle" value="Indonesia"> Indonesia (20)</label>
                <label><input type="checkbox" class="country-toggle" value="Philippines"> Philippines (20)</label>
                <label><input type="checkbox" class="country-toggle" value="Brunei"> Brunei (2)</label>
                <label><input type="checkbox" class="country-toggle" value="TimorLeste"> Timor-Leste (2)</label>
                <label><input type="checkbox" class="country-toggle" value="China"> China (20)</label>
                <label><input type="checkbox" class="country-toggle" value="Taiwan"> Taiwan (3)</label>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        const apiKey = 'eae5ff84ba6f569b65934b8b1ac8abc3';

        // 1. INITIALIZE MAP
        const map = L.map('map', { zoomControl: false }).setView([10.0, 110.0], 4);
        L.control.zoom({ position: 'topleft' }).addTo(map);

        // 2. BASEMAPS
        const basemaps = {
            night: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }),
            ocean: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };
        basemaps.night.addTo(map); // Default

        // 3. STATION DATA (104 Stations exactly as requested)
        const stationData = {
            "Myanmar": [
                { name: "Yangon", lat: 16.79, lon: 96.15 }, { name: "Mandalay", lat: 21.95, lon: 96.08 }, { name: "Naypyidaw", lat: 19.75, lon: 96.10 }
            ],
            "Laos": [
                { name: "Vientiane", lat: 17.97, lon: 102.56 }, { name: "Luang Prabang", lat: 19.88, lon: 102.13 }, { name: "Pakse", lat: 15.12, lon: 105.78 }
            ],
            "Thailand": [
                { name: "Bangkok", lat: 13.75, lon: 100.50 }, { name: "Chiang Mai", lat: 18.78, lon: 98.98 }, { name: "Phuket", lat: 7.88, lon: 98.39 }, { name: "Khon Kaen", lat: 16.43, lon: 102.82 }, { name: "Hat Yai", lat: 7.00, lon: 100.46 }
            ],
            "Vietnam": [
                { name: "Hanoi", lat: 21.02, lon: 105.83 }, { name: "Ho Chi Minh", lat: 10.82, lon: 106.62 }, { name: "Da Nang", lat: 16.05, lon: 108.20 }
            ],
            "Cambodia": [
                { name: "Phnom Penh", lat: 11.55, lon: 104.91 }, { name: "Siem Reap", lat: 13.36, lon: 103.85 }, { name: "Sihanoukville", lat: 10.62, lon: 103.52 }
            ],
            "Malaysia": [
                { name: "Sepang KLIA", lat: 2.75, lon: 101.70 }, { name: "Subang", lat: 3.13, lon: 101.55 }, { name: "Penang", lat: 5.29, lon: 100.27 },
                { name: "Langkawi", lat: 6.33, lon: 99.73 }, { name: "Alor Setar", lat: 6.19, lon: 100.40 }, { name: "Ipoh", lat: 4.56, lon: 101.09 },
                { name: "Malacca", lat: 2.25, lon: 102.25 }, { name: "Johor Bahru", lat: 1.63, lon: 103.66 }, { name: "Kuantan", lat: 3.77, lon: 103.21 },
                { name: "Kuala Terengganu", lat: 5.38, lon: 103.10 }, { name: "Kota Bharu", lat: 6.16, lon: 102.29 }, { name: "Kuching", lat: 1.48, lon: 110.33 },
                { name: "Sibu", lat: 2.26, lon: 111.82 }, { name: "Bintulu", lat: 3.20, lon: 113.03 }, { name: "Kota Kinabalu", lat: 5.93, lon: 116.05 }
            ],
            "Singapore": [
                { name: "Changi", lat: 1.36, lon: 103.99 }, { name: "Paya Lebar", lat: 1.36, lon: 103.91 }, { name: "Seletar", lat: 1.41, lon: 103.86 },
                { name: "Tengah", lat: 1.38, lon: 103.71 }, { name: "Sentosa", lat: 1.24, lon: 103.82 }
            ],
            "Indonesia": [
                { name: "Jakarta", lat: -6.12, lon: 106.65 }, { name: "Bandung", lat: -6.90, lon: 107.57 }, { name: "Surabaya", lat: -7.37, lon: 112.78 },
                { name: "Yogyakarta", lat: -7.87, lon: 110.43 }, { name: "Semarang", lat: -6.98, lon: 110.37 }, { name: "Medan", lat: 3.63, lon: 98.88 },
                { name: "Padang", lat: -0.88, lon: 100.32 }, { name: "Palembang", lat: -2.89, lon: 104.70 }, { name: "Pekanbaru", lat: 0.46, lon: 101.44 },
                { name: "Batam", lat: 1.12, lon: 104.11 }, { name: "Denpasar", lat: -8.74, lon: 115.16 }, { name: "Lombok", lat: -8.75, lon: 116.27 },
                { name: "Kupang", lat: -10.17, lon: 123.67 }, { name: "Pontianak", lat: -0.05, lon: 109.40 }, { name: "Balikpapan", lat: -1.26, lon: 116.89 },
                { name: "Samarinda", lat: -0.48, lon: 117.15 }, { name: "Banjarmasin", lat: -3.44, lon: 114.75 }, { name: "Makassar", lat: -5.06, lon: 119.55 },
                { name: "Manado", lat: 1.53, lon: 124.92 }, { name: "Ambon", lat: -3.70, lon: 128.18 }
            ],
            "Philippines": [
                { name: "Manila", lat: 14.51, lon: 121.01 }, { name: "Clark", lat: 15.18, lon: 120.55 }, { name: "Subic", lat: 14.79, lon: 120.27 },
                { name: "Laoag", lat: 18.17, lon: 120.53 }, { name: "Tuguegarao", lat: 17.63, lon: 121.73 }, { name: "Baguio", lat: 16.37, lon: 120.62 },
                { name: "Legazpi", lat: 13.15, lon: 123.73 }, { name: "Puerto Princesa", lat: 9.73, lon: 118.75 }, { name: "Iloilo", lat: 10.83, lon: 122.53 },
                { name: "Bacolod", lat: 10.77, lon: 123.01 }, { name: "Cebu", lat: 10.31, lon: 123.97 }, { name: "Tagbilaran", lat: 9.66, lon: 123.85 },
                { name: "Tacloban", lat: 11.22, lon: 125.02 }, { name: "Zamboanga", lat: 6.92, lon: 122.06 }, { name: "Davao", lat: 7.12, lon: 125.64 },
                { name: "General Santos", lat: 6.06, lon: 125.09 }, { name: "Cotabato", lat: 7.16, lon: 124.21 }, { name: "Cagayan de Oro", lat: 8.41, lon: 124.61 },
                { name: "Butuan", lat: 8.95, lon: 125.47 }, { name: "Surigao", lat: 9.79, lon: 125.48 }
            ],
            "Brunei": [
                { name: "Brunei Int", lat: 4.94, lon: 114.93 }, { name: "Seria", lat: 4.60, lon: 114.31 }
            ],
            "TimorLeste": [
                { name: "Dili", lat: -8.55, lon: 125.52 }, { name: "Baucau", lat: -8.48, lon: 126.39 }
            ],
            "China": [
                { name: "Beijing", lat: 40.08, lon: 116.58 }, { name: "Shanghai", lat: 31.14, lon: 121.80 }, { name: "Guangzhou", lat: 23.39, lon: 113.29 },
                { name: "Shenzhen", lat: 22.63, lon: 113.81 }, { name: "Chengdu", lat: 30.57, lon: 103.95 }, { name: "Chongqing", lat: 29.71, lon: 106.64 },
                { name: "Xi'an", lat: 34.44, lon: 108.75 }, { name: "Kunming", lat: 25.10, lon: 102.93 }, { name: "Hangzhou", lat: 30.22, lon: 120.43 },
                { name: "Nanjing", lat: 31.74, lon: 118.86 }, { name: "Wuhan", lat: 30.78, lon: 114.20 }, { name: "Zhengzhou", lat: 34.52, lon: 113.84 },
                { name: "Changsha", lat: 28.19, lon: 113.21 }, { name: "Qingdao", lat: 36.26, lon: 120.01 }, { name: "Xiamen", lat: 24.54, lon: 118.12 },
                { name: "Haikou", lat: 20.05, lon: 110.45 }, { name: "Sanya", lat: 18.30, lon: 109.41 }, { name: "Guiyang", lat: 26.53, lon: 106.80 },
                { name: "Nanning", lat: 22.60, lon: 108.17 }, { name: "Fuzhou", lat: 25.93, lon: 119.66 }
            ],
            "Taiwan": [
                { name: "Taipei", lat: 25.08, lon: 121.23 }, { name: "Kaohsiung", lat: 22.57, lon: 120.34 }, { name: "Taichung", lat: 24.26, lon: 120.62 }
            ]
        };

        // Track layers and if data has been fetched
        const countryLayers = {};
        const isCountryLoaded = {};

        // Initialize empty layer groups for each country
        Object.keys(stationData).forEach(country => {
            countryLayers[country] = L.layerGroup();
            isCountryLoaded[country] = false;
        });

        // 4. UI INTERACTION LOGIC
        
        // Toggle Basemap Menu
        document.getElementById('btn-basemap').addEventListener('click', () => {
            const menu = document.getElementById('menu-basemap');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('menu-country').style.display = 'none'; // Close the other menu
        });

        // Toggle Country Menu
        document.getElementById('btn-country').addEventListener('click', () => {
            const menu = document.getElementById('menu-country');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
            document.getElementById('menu-basemap').style.display = 'none'; // Close the other menu
        });

        // Change Basemap
        document.querySelectorAll('input[name="basemap"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                // Remove all basemaps first
                Object.values(basemaps).forEach(layer => map.removeLayer(layer));
                // Add selected basemap
                basemaps[e.target.value].addTo(map);
            });
        });

        // 5. FETCH DATA ONLY WHEN COUNTRY IS CHECKED
        document.querySelectorAll('.country-toggle').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                const country = e.target.value;

                if (e.target.checked) {
                    // If checked, add the layer to the map
                    countryLayers[country].addTo(map);
                    
                    // If we haven't fetched the weather for this country yet, fetch it now!
                    if (!isCountryLoaded[country]) {
                        stationData[country].forEach(station => {
                            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${station.lat}&lon=${station.lon}&appid=${apiKey}&units=metric`;

                            fetch(url)
                                .then(response => response.json())
                                .then(data => {
                                    const popupContent = `
                                        <div class="popup-content">
                                            <h3>${station.name}</h3>
                                            <p><strong>Temperature:</strong> ${data.main.temp} °C</p>
                                            <p><strong>Wind:</strong> ${data.wind.speed} m/s at ${data.wind.deg}&deg;</p>
                                            <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
                                            <p><strong>Pressure:</strong> ${data.main.pressure} hPa</p>
                                            <p><strong>Rainfall (1h):</strong> ${(data.rain && data.rain['1h']) ? data.rain['1h'] : 0} mm</p>
                                        </div>
                                    `;
                                    // Plot point and add directly to this country's layer
                                    L.marker([station.lat, station.lon])
                                        .bindPopup(popupContent)
                                        .addTo(countryLayers[country]);
                                })
                                .catch(err => console.error(`Failed to fetch ${station.name}`, err));
                        });
                        // Mark as loaded so we don't spam the API if the user unchecks and re-checks it
                        isCountryLoaded[country] = true; 
                    }
                } else {
                    // If unchecked, simply remove the layer from the map to hide the points
                    map.removeLayer(countryLayers[country]);
                }
            });
        });

    </script>
</body>
</html>
