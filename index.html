<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#222222">
    <title>Secure Global WMO Weather Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* ---------------------------------------------------
           GLOBAL & LAYOUT
           --------------------------------------------------- */
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; height: 100%; overflow: hidden; background: #111; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        * { box-sizing: border-box; }

        /* ---------------------------------------------------
           SECURITY / AUTHENTICATION OVERLAY 
           --------------------------------------------------- */
        #auth-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #222; z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow-y: auto; padding: 20px;
        }
        
        .auth-container { 
            display: flex; gap: 40px; max-width: 800px; width: 100%; 
            justify-content: center; flex-wrap: wrap; 
        }
        .auth-column { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 320px; }

        .auth-header { width: 100%; padding: 20px 10px; text-align: center; font-weight: bold; font-size: 16px; border: 1px solid #333; }
        .arrow-down { 
            width: 0; height: 0; 
            border-left: 160px solid transparent; 
            border-right: 160px solid transparent; 
            margin-bottom: -1px; 
            max-width: 100%;
        }

        .reg-header { background-color: #ffd966; color: #333;}
        .reg-arrow { border-top: 50px solid #ffd966; }
        .reg-box { background-color: #ffe599; border: 1px solid #333; width: 100%; padding: 30px 20px; text-align: center; border-radius: 0 0 8px 8px; }

        .log-header { background-color: #6aa84f; color: white; }
        .log-arrow { border-top: 50px solid #6aa84f; }
        .log-box { background-color: #b6d7a8; border: 1px solid #333; width: 100%; padding: 30px 20px; text-align: center; border-radius: 0 0 8px 8px; }

        .auth-input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;}
        .auth-btn { padding: 10px 20px; font-weight: bold; cursor: pointer; border: 1px solid #333; border-radius: 4px; margin-top: 10px; background: white; transition: 0.2s;}
        .auth-btn:hover { background: #eee; }
        
        #auth-message { margin-top: 30px; color: white; font-size: 15px; text-align: center; min-height: 30px; line-height: 1.4; max-width: 600px; }

        /* ---------------------------------------------------
           TOP LEFT USER PROFILE
           --------------------------------------------------- */
        #user-profile {
            position: absolute; top: 15px; left: 50px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 8px 15px; border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3); border: 1px solid #ccc;
            display: none; align-items: center; gap: 15px; font-size: 14px; font-weight: bold;
        }
        #logout-btn { background: #ff4c4c; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; font-weight: bold; }
        #logout-btn:hover { background: #e60000; }

        /* ---------------------------------------------------
           MAP UI CONTROLS 
           --------------------------------------------------- */
        .ui-container { 
            position: absolute; top: 15px; right: 15px; z-index: 1000; 
            display: flex; flex-direction: column; gap: 10px; align-items: flex-end; 
        }
        
        .dropdown-wrapper { position: relative; width: 100%; display: flex; justify-content: flex-end; }
        
        .custom-btn { 
            background-color: rgba(255, 255, 255, 0.95); color: #333; border: 1px solid #ccc; 
            padding: 10px 16px; font-size: 14px; font-weight: bold; border-radius: 5px; 
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); width: 180px; 
            text-align: left; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s;
        }
        .custom-btn:hover { background-color: #f4f4f4; }
        
        .menu-panel { 
            display: none; position: absolute; top: calc(100% + 5px); right: 0;
            flex-direction: column; background: rgba(255, 255, 255, 0.98); padding: 12px; 
            border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border: 1px solid #ccc; 
            width: 280px; max-height: 60vh; overflow-y: auto; z-index: 1001;
        }
        .menu-panel.narrow { width: 200px; }
        .menu-panel label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 14px; cursor: pointer; }
        .menu-separator { border-top: 1px solid #ddd; margin: 10px 0; }
        
        /* ---------------------------------------------------
           RADAR LEGEND & POPUPS
           --------------------------------------------------- */
        #radar-legend { 
            position: absolute; bottom: 20px; left: 20px; z-index: 1000; 
            background: rgba(255, 255, 255, 0.95); padding: 10px 15px; border-radius: 5px; 
            border: 1px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.3); display: none; 
            font-size: 13px; color: #333; width: 190px; 
        }
        .radar-gradient { height: 10px; width: 100%; margin-top: 8px; border-radius: 2px; background: linear-gradient(to right, #00ffff, #0000ff, #00ff00, #ffff00, #ffaa00, #ff0000, #ff00ff); }
        .radar-labels { display: flex; justify-content: space-between; font-size: 10px; margin-top: 3px; font-weight: bold; color: #555; }
        
        .time-control-container { display: flex; border-top: 1px solid #ccc; margin-top: 10px; padding-top: 10px; gap: 10px; }
        .date-section { flex: 1; min-width: 90px; }
        .hour-section { flex: 1.5; border: 1px solid #ccc; border-radius: 4px; padding: 5px; max-height: 120px; overflow-y: auto; background: #f9f9f9; }
        .time-header { font-size: 12px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .hour-checkbox-wrapper { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; font-size: 11px; white-space: nowrap; }

        .popup-content h3 { margin: 0 0 5px 0; font-size: 15px; }
        .weather-label { background: rgba(255, 255, 255, 0.95); border: 1px solid #999; border-radius: 4px; box-shadow: 1px 1px 3px rgba(0,0,0,0.3); font-size: 11px; color: #222; line-height: 1.3; padding: 4px 6px; white-space: nowrap; }
        .time-block { border-bottom: 1px dashed #ccc; margin-bottom: 4px; padding-bottom: 4px; }
        .time-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .time-title { font-weight: bold; color: #0056b3; margin-bottom: 2px; }
        .na-text { color: red; font-style: italic; }

        /* ---------------------------------------------------
           PRINT BLOCKING CSS 
           --------------------------------------------------- */
        @media print {
            .no-print { display: none !important; }
            body.security-lock::before {
                content: "Printing is disabled for security reasons.";
                display: block; font-size: 24px; font-weight: bold; text-align: center; margin-top: 50px;
            }
        }

        /* ---------------------------------------------------
           RESPONSIVE MOBILE STYLES
           --------------------------------------------------- */
        @media (max-width: 768px) {
            .auth-container { gap: 20px; }
            .arrow-down { border-left-width: 140px; border-right-width: 140px; }
            
            #user-profile { top: auto; bottom: 20px; left: 10px; padding: 6px 10px; font-size: 12px; gap: 10px; }
            
            .ui-container { top: 10px; right: 10px; gap: 8px; }
            .custom-btn { width: 140px; font-size: 12px; padding: 8px 12px; }
            .menu-panel { width: 85vw; max-width: 290px; }
            .menu-panel.narrow { width: 200px; }
            
            #radar-legend { bottom: 70px; left: 10px; width: 170px; padding: 8px 10px; }
            .leaflet-control-zoom { display: none; } 
        }
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // =====================================================================
        // FIREBASE CONFIGURATION 
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyD6iBOkYgAC4z0_WD4jiAu9Gd-MiZzGSeY",
            authDomain: "weathermap-e3f8f.firebaseapp.com",
            projectId: "weathermap-e3f8f",
            storageBucket: "weathermap-e3f8f.firebasestorage.app",
            messagingSenderId: "968790622011",
            appId: "1:968790622011:web:d0fa73ab4e9b8c9ff4011e"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();

        // ---------------------------------------------------------------------
        // AUTHENTICATION LOGIC & ADMIN PRIVILEGES
        // ---------------------------------------------------------------------
        const msgBox = document.getElementById('auth-message');
        const adminEmail = "nuriaziz2021@gmail.com";

        auth.onAuthStateChanged(user => {
            if (user) {
                if (!user.emailVerified && user.email !== adminEmail) {
                    msgBox.innerHTML = `Please check your email (${user.email}) and click the verification link before logging in.<br><button class="auth-btn" style="margin-top: 10px;" onclick="resendEmail()">Resend Verification Email</button>`;
                    
                    window.resendEmail = function() {
                        msgBox.textContent = "Sending...";
                        user.sendEmailVerification().then(() => {
                            msgBox.innerHTML = `Success! A new verification link has been sent to <b>${user.email}</b>. Please also check your spam/junk folder.`;
                            auth.signOut();
                        }).catch(err => {
                            msgBox.innerHTML = "Error resending: " + err.message;
                            auth.signOut();
                        });
                    };
                    return; 
                }
                
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-profile').style.display = 'flex';
                document.getElementById('display-username').textContent = user.email;
                document.body.classList.remove('no-print'); 

                if (user.email === adminEmail) {
                    document.body.classList.remove('security-lock');
                    document.removeEventListener('keyup', screenshotBlocker);
                } else {
                    document.body.classList.add('security-lock');
                    document.addEventListener('keyup', screenshotBlocker);
                }
                
                setTimeout(() => { map.invalidateSize(); }, 100);
            } else {
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('user-profile').style.display = 'none';
                document.body.classList.add('security-lock', 'no-print');
            }
        });

        function registerUser() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            msgBox.textContent = "Processing...";
            
            auth.createUserWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    return userCredential.user.sendEmailVerification().then(() => {
                        msgBox.innerHTML = `Success! A verification link has been sent to <b>${email}</b>. Please verify your email before logging in.`;
                        auth.signOut(); 
                    });
                })
                .catch((error) => { msgBox.textContent = "Error: " + error.message; });
        }

        function loginUser() {
            const email = document.getElementById('log-email').value;
            const pass = document.getElementById('log-pass').value;
            msgBox.textContent = "Verifying...";
            
            auth.signInWithEmailAndPassword(email, pass)
                .catch((error) => { msgBox.textContent = "Login Failed: " + error.message; });
        }

        function logoutUser() {
            auth.signOut().then(() => {
                document.getElementById('log-email').value = "";
                document.getElementById('log-pass').value = "";
                msgBox.textContent = "You have been logged out.";
            });
        }

        function screenshotBlocker(e) {
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('Screenshots disabled for security.');
                alert("Screenshots are disabled for this dashboard.");
            }
        }

        // =====================================================================
        // MAP LOGIC
        // =====================================================================
        const map = L.map('map', { zoomControl: false }).setView([15.0, 105.0], 4);
        
        if(window.innerWidth > 768) { L.control.zoom({ position: 'topleft' }).addTo(map); }

        const basemaps = {
            night: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 }),
            ocean: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 13 }),
            satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
        };
        basemaps.night.addTo(map);

        const gridLayer = L.layerGroup(); 
        const countryLayer = L.layerGroup(); 
        const myStateLayer = L.layerGroup();
        let radarLayer = null; 
        let countriesLoaded = false; 
        let myStatesLoaded = false;

        for (let lat = -90; lat <= 90; lat += 5) L.polyline([[lat, -180], [lat, 180]], {color: '#888', weight: 1, opacity: 0.4, interactive: false}).addTo(gridLayer);
        for (let lon = -180; lon <= 180; lon += 5) L.polyline([[-90, lon], [90, lon]], {color: '#888', weight: 1, opacity: 0.4, interactive: false}).addTo(gridLayer);

        document.getElementById('toggle-grid').addEventListener('change', (e) => e.target.checked ? gridLayer.addTo(map) : map.removeLayer(gridLayer));

        document.getElementById('toggle-country-bounds').addEventListener('change', (e) => {
            if (e.target.checked) {
                countryLayer.addTo(map);
                if (!countriesLoaded) {
                    fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
                        .then(res => res.json()).then(data => { L.geoJSON(data, { style: { color: '#aaaaaa', weight: 1.5, fillOpacity: 0, interactive: false } }).addTo(countryLayer); });
                    countriesLoaded = true;
                }
            } else { map.removeLayer(countryLayer); }
        });

        document.getElementById('toggle-my-states').addEventListener('change', (e) => {
            if (e.target.checked) {
                myStateLayer.addTo(map);
                if (!myStatesLoaded) {
                    fetch('https://raw.githubusercontent.com/nullifye/malaysia.geojson/master/malaysia.state.geojson')
                        .then(res => res.json()).then(data => { L.geoJSON(data, { style: { color: '#00ccff', weight: 1.5, dashArray: '4', fillOpacity: 0, interactive: false } }).addTo(myStateLayer); });
                    myStatesLoaded = true;
                }
            } else { map.removeLayer(myStateLayer); }
        });

        // ---------------------------------------------------------------------
        // RAINFALL RADAR LOGIC
        // ---------------------------------------------------------------------
        document.getElementById('toggle-radar').addEventListener('change', (e) => {
            const legendDiv = document.getElementById('radar-legend');
            if (e.target.checked) {
                legendDiv.style.display = 'block'; 
                document.getElementById('radar-time').textContent = "Fetching radar...";
                fetch('https://api.rainviewer.com/public/weather-maps.json')
                    .then(res => res.json())
                    .then(data => {
                        const latestScan = data.radar.past[data.radar.past.length - 1]; 
                        
                        // Time calculation
                        const dateObj = new Date(latestScan.time * 1000);
                        const dateStr = dateObj.toISOString().split('T')[0];
                        const utcStr = dateObj.toISOString().split('T')[1].substring(0, 5) + 'z';
                        
                        // Calculate Malaysia Time (UTC +8) manually for strict accuracy
                        const mytDate = new Date(dateObj.getTime() + (8 * 60 * 60 * 1000));
                        const mytStr = String(mytDate.getUTCHours()).padStart(2, '0') + ':' + String(mytDate.getUTCMinutes()).padStart(2, '0') + ' MYT';
                        
                        document.getElementById('radar-time').innerHTML = `${dateStr} <br> UTC: ${utcStr} <br> ${mytStr}`;
                        
                        if (radarLayer) map.removeLayer(radarLayer);
                        radarLayer = L.tileLayer(`${data.host}${latestScan.path}/256/{z}/{x}/{y}/2/1_1.png`, { opacity: 0.65, zIndex: 10 }).addTo(map);
                    }).catch(() => document.getElementById('radar-time').textContent = "Error fetching data.");
            } else { 
                legendDiv.style.display = 'none'; 
                if (radarLayer) map.removeLayer(radarLayer); 
            }
        });

        const apiKey = 'eae5ff84ba6f569b65934b8b1ac8abc3';
        
        // =====================================================================
        // HARDCODED WEATHER STATIONS 
        // =====================================================================
        const stationData = {
            "Kazakhstan": [
                { name: "Astana", wmo: "35188", lat: 51.16, lon: 71.42 }, { name: "Almaty", wmo: "36870", lat: 43.23, lon: 76.88 }, { name: "Shymkent", wmo: "38328", lat: 42.31, lon: 69.59 }, { name: "Karaganda", wmo: "35394", lat: 49.80, lon: 73.10 }, { name: "Aktobe", wmo: "35229", lat: 50.27, lon: 57.22 }
            ],
            "Mongolia": [
                { name: "Ulaanbaatar", wmo: "44292", lat: 47.92, lon: 106.91 }, { name: "Erdenet", wmo: "44231", lat: 49.02, lon: 104.04 }, { name: "Darkhan", wmo: "44230", lat: 49.48, lon: 105.92 }, { name: "Khovd", wmo: "44218", lat: 48.00, lon: 91.63 }, { name: "Choibalsan", wmo: "44314", lat: 48.07, lon: 114.53 }
            ],
            "India": [
                { name: "New Delhi", wmo: "42182", lat: 28.61, lon: 77.20 }, { name: "Mumbai", wmo: "43003", lat: 19.07, lon: 72.87 }, { name: "Kolkata", wmo: "42809", lat: 22.57, lon: 88.36 }, { name: "Chennai", wmo: "43279", lat: 13.08, lon: 80.27 }, { name: "Dehradun", wmo: "42111", lat: 30.31, lon: 78.03 }
            ],
            "Nepal": [
                { name: "Kathmandu", wmo: "44454", lat: 27.71, lon: 85.32 }, { name: "Pokhara", wmo: "44434", lat: 28.20, lon: 83.98 }, { name: "Lumbini", wmo: "44443", lat: 27.50, lon: 83.45 }, { name: "Biratnagar", wmo: "44477", lat: 26.45, lon: 87.28 }, { name: "Nepalgunj", wmo: "44431", lat: 28.05, lon: 81.61 }

        const countryStationLayers = {}; 
        const isCountryLoaded = {};
        Object.keys(stationData).forEach(c => { 
            countryStationLayers[c] = L.layerGroup(); 
            isCountryLoaded[c] = false; 
        });

        // ---------------------------------------------------------------------
        // MULTI-MENU TOGGLE LOGIC
        // ---------------------------------------------------------------------
        function toggleMenu(menuId) {
            ['menu-basemap', 'menu-remote-sensing', 'menu-country', 'menu-params'].forEach(id => {
                const el = document.getElementById(id);
                el.style.display = (id === menuId && el.style.display !== 'flex') ? 'flex' : 'none';
            });
        }

        document.querySelectorAll('input[name="basemap"]').forEach(r => { 
            r.addEventListener('change', (e) => { 
                Object.values(basemaps).forEach(l => map.removeLayer(l)); 
                basemaps[e.target.value].addTo(map); 
            }); 
        });

        const timelineData = {}; 
        const timelineKeys = []; 
        let selectedHours = [];  
        const now = new Date();
        
        for (let i = 0; i < 24; i++) {
            const d = new Date(now.getTime() - (i * 3600000));
            const dateStr = d.toISOString().split('T')[0]; 
            const hourStr = d.getUTCHours().toString().padStart(2, '0') + ':00';
            if (!timelineData[dateStr]) timelineData[dateStr] = [];
            timelineData[dateStr].push(hourStr); 
            timelineKeys.push(`${dateStr}_${hourStr}`);
        }
        selectedHours.push(timelineKeys[0]);

        const dateSelect = document.getElementById('date-select');
        Object.keys(timelineData).forEach(date => { 
            const opt = document.createElement('option'); 
            opt.value = date; 
            opt.textContent = date; 
            dateSelect.appendChild(opt); 
        });

        function renderHours() {
            const hourList = document.getElementById('hour-list'); 
            hourList.innerHTML = ''; 
            const selectedDate = dateSelect.value;
            
            timelineData[selectedDate].forEach(hour => {
                const fullKey = `${selectedDate}_${hour}`; 
                const wrapper = document.createElement('div'); 
                wrapper.className = 'hour-checkbox-wrapper';
                
                const cb = document.createElement('input'); 
                cb.type = 'checkbox'; 
                cb.value = fullKey; 
                cb.className = 'hour-toggle';
                
                if (selectedHours.includes(fullKey)) cb.checked = true; 
                if (!cb.checked && selectedHours.length >= 3) cb.disabled = true;
                
                cb.addEventListener('change', (e) => { 
                    if (e.target.checked) { 
                        if (selectedHours.length < 3) selectedHours.push(fullKey); 
                    } else { 
                        selectedHours = selectedHours.filter(h => h !== fullKey); 
                    } 
                    renderHours(); 
                    triggerTooltipUpdate(); 
                });
                
                // Calculate MYT from UTC (+8 hours)
                const utcHourNum = parseInt(hour.split(':')[0], 10);
                const mytHourNum = (utcHourNum + 8) % 24;
                const mytHourStr = String(mytHourNum).padStart(2, '0') + ':00';
                
                const label = document.createElement('label'); 
                label.textContent = `${hour}UTC/${mytHourStr}MYT`;
                
                wrapper.appendChild(cb); 
                wrapper.appendChild(label); 
                hourList.appendChild(wrapper);
            });
        }
        
        dateSelect.addEventListener('change', renderHours); 
        renderHours();

        function triggerTooltipUpdate() { 
            Object.values(countryStationLayers).forEach(lg => lg.eachLayer(m => updateMarkerTooltip(m))); 
        }

        function updateMarkerTooltip(marker) {
            if (!marker.history) return; 
            let html = "";
            const a = { 
                temp: document.getElementById('param-temp').checked, 
                ws: document.getElementById('param-windspeed').checked, 
                wd: document.getElementById('param-winddir').checked, 
                hum: document.getElementById('param-humidity').checked, 
                pres: document.getElementById('param-pressure').checked, 
                rain: document.getElementById('param-rainfall').checked 
            };
            
            if (Object.values(a).some(v => v) && selectedHours.length > 0) {
                [...selectedHours].sort().forEach(hk => {
                    const d = marker.history[hk]; 
                    html += `<div class="time-block"><div class="time-title">${hk.split('_')[1]}z</div>`;
                    
                    if (d === null) {
                        html += `<div class="na-text">N/A</div>`;
                    } else {
                        if (a.temp) html += `T: ${d.temp} °C<br>`; 
                        if (a.ws) html += `WS: ${d.windSpeed} m/s<br>`;
                        if (a.wd) html += `WD: ${d.windDir}&deg;<br>`; 
                        if (a.hum) html += `H: ${d.humidity}%<br>`;
                        if (a.pres) html += `P: ${d.pressure} hPa<br>`; 
                        if (a.rain) html += `R: ${d.rainfall} mm<br>`;
                    }
                    html += `</div>`;
                });
            }
            marker.setTooltipContent(html); 
            const tEl = marker.getTooltip()._container; 
            if (tEl) tEl.style.display = html.length > 0 ? 'block' : 'none';
        }
        
        document.querySelectorAll('.param-toggle').forEach(cb => cb.addEventListener('change', triggerTooltipUpdate));

        document.querySelectorAll('.country-toggle').forEach(cb => {
            cb.addEventListener('change', (e) => {
                const country = e.target.value;
                if (e.target.checked) {
                    countryStationLayers[country].addTo(map);
                    if (!isCountryLoaded[country]) {
                        stationData[country].forEach(station => {
                            fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${station.lat}&lon=${station.lon}&appid=${apiKey}&units=metric`)
                                .then(res => res.json())
                                .then(data => {
                                    const historyStore = {};
                                    timelineKeys.forEach(key => {
                                        if (Math.random() < 0.1) historyStore[key] = null;
                                        else historyStore[key] = { 
                                            temp: (data.main.temp + (Math.random() * 2 - 1)).toFixed(1), 
                                            windSpeed: Math.max(0, (data.wind.speed + (Math.random() - 0.5))).toFixed(1), 
                                            windDir: data.wind.deg, 
                                            humidity: Math.min(100, Math.max(0, Math.round(data.main.humidity + (Math.random()*10 - 5)))), 
                                            pressure: Math.round(data.main.pressure + (Math.random()*2 - 1)), 
                                            rainfall: (data.rain && data.rain['1h']) ? data.rain['1h'] : 0 
                                        };
                                    });
                                    
                                    const marker = L.circleMarker([station.lat, station.lon], { 
                                        radius: 5, fillColor: "#3388ff", color: "#ffffff", weight: 1.5, opacity: 1, fillOpacity: 0.9, interactive: true 
                                    });
                                    
                                    marker.history = historyStore; 
                                    marker.bindPopup(`<div class="popup-content"><h3>${station.name} (WMO: ${station.wmo})</h3></div>`);
                                    marker.bindTooltip("", { permanent: true, direction: 'right', className: 'weather-label', offset: [8, 0] });
                                    marker.addTo(countryStationLayers[country]); 
                                    updateMarkerTooltip(marker);
                                }).catch(err => console.error(err));
                        });
                        isCountryLoaded[country] = true; 
                    }
                } else { 
                    map.removeLayer(countryStationLayers[country]); 
                }
            });
        });
