<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SE Asia Weather Map</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
        }
        #map { 
            width: 100vw; 
            height: 100vh; 
        }
        .popup-content { 
            font-family: Arial, sans-serif; 
            font-size: 14px; 
        }
        .popup-content h3 { 
            margin: 0 0 5px 0; 
            border-bottom: 1px solid #ccc; 
            padding-bottom: 5px; 
        }
        .popup-content p { 
            margin: 4px 0; 
        }
        /* Adding a little margin to separate the two control boxes */
        .leaflet-control-layers:first-child {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ---------------------------------------------------------
        // 1. INITIALIZE THE MAP
        // ---------------------------------------------------------
        // Centered over Southeast Asia to view all selected countries
        const map = L.map('map').setView([10.0, 110.0], 4);

        // ---------------------------------------------------------
        // 2. DEFINE BASEMAP LAYERS
        // ---------------------------------------------------------
        const esriOcean = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Ocean/World_Ocean_Base/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 13
        });

        const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        const nightMode = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap & CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        });

        // Set Night Mode as default
        nightMode.addTo(map);

        // ---------------------------------------------------------
        // 3. CREATE LAYER GROUPS FOR EACH COUNTRY
        // ---------------------------------------------------------
        const layers = {
            "Myanmar": L.layerGroup().addTo(map),
            "Laos": L.layerGroup().addTo(map),
            "Thailand": L.layerGroup().addTo(map),
            "Vietnam": L.layerGroup().addTo(map),
            "Cambodia": L.layerGroup().addTo(map),
            "Malaysia": L.layerGroup().addTo(map),
            "Singapore": L.layerGroup().addTo(map),
            "Indonesia": L.layerGroup().addTo(map),
            "Philippines": L.layerGroup().addTo(map),
            "Brunei": L.layerGroup().addTo(map),
            "Timor-Leste": L.layerGroup().addTo(map),
            "China": L.layerGroup().addTo(map),
            "Taiwan": L.layerGroup().addTo(map)
        };

        // ---------------------------------------------------------
        // 4. STATION DATA BY COUNTRY
        // ---------------------------------------------------------
        // Keeping it lightweight (1-2 major stations per country) to avoid API rate limits.
        const stations = [
            { country: "Myanmar", name: "Yangon", lat: 16.90, lon: 96.13 },
            { country: "Laos", name: "Vientiane", lat: 17.97, lon: 102.56 },
            { country: "Thailand", name: "Bangkok", lat: 13.68, lon: 100.75 },
            { country: "Vietnam", name: "Hanoi", lat: 21.22, lon: 105.81 },
            { country: "Vietnam", name: "Ho Chi Minh City", lat: 10.82, lon: 106.66 },
            { country: "Cambodia", name: "Phnom Penh", lat: 11.55, lon: 104.84 },
            { country: "Malaysia", name: "Sepang KLIA", lat: 2.75, lon: 101.70 },
            { country: "Malaysia", name: "Kuching", lat: 1.48, lon: 110.34 },
            { country: "Singapore", name: "Changi", lat: 1.36, lon: 103.99 },
            { country: "Indonesia", name: "Jakarta", lat: -6.13, lon: 106.66 },
            { country: "Indonesia", name: "Bali", lat: -8.74, lon: 115.16 },
            { country: "Philippines", name: "Manila", lat: 14.51, lon: 121.01 },
            { country: "Brunei", name: "Brunei Int Airport", lat: 4.94, lon: 114.93 },
            { country: "Timor-Leste", name: "Dili", lat: -8.55, lon: 125.52 },
            { country: "China", name: "Beijing", lat: 40.08, lon: 116.58 },
            { country: "China", name: "Guangzhou", lat: 23.39, lon: 113.29 },
            { country: "Taiwan", name: "Taipei", lat: 25.08, lon: 121.23 }
        ];

        const apiKey = 'eae5ff84ba6f569b65934b8b1ac8abc3';

        // ---------------------------------------------------------
        // 5. FETCH DATA & PLOT MARKERS
        // ---------------------------------------------------------
        stations.forEach(station => {
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${station.lat}&lon=${station.lon}&appid=${apiKey}&units=metric`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    const temp = data.main.temp;
                    const pressure = data.main.pressure;
                    const humidity = data.main.humidity;
                    const windSpeed = data.wind.speed;
                    const windDir = data.wind.deg;
                    const rainfall = (data.rain && data.rain['1h']) ? data.rain['1h'] : 0;

                    const popupContent = `
                        <div class="popup-content">
                            <h3>${station.name}, ${station.country}</h3>
                            <p><strong>Temperature:</strong> ${temp} °C</p>
                            <p><strong>Wind:</strong> ${windSpeed} m/s at ${windDir}&deg;</p>
                            <p><strong>Humidity:</strong> ${humidity}%</p>
                            <p><strong>Pressure:</strong> ${pressure} hPa</p>
                            <p><strong>Rainfall (last 1h):</strong> ${rainfall} mm</p>
                        </div>
                    `;

                    // Add the marker directly to the specific country's layer group
                    L.marker([station.lat, station.lon])
                        .bindPopup(popupContent)
                        .addTo(layers[station.country]);
                })
                .catch(error => console.error(`Error fetching data for ${station.name}:`, error));
        });

        // ---------------------------------------------------------
        // 6. ADD SEPARATE LAYER CONTROLS (MENUS)
        // ---------------------------------------------------------
        
        // --- CONTROL BOX 1: Base Maps ---
        const baseMaps = {
            "Night Mode": nightMode,
            "Blue Ocean": esriOcean,  // Name changed as requested
            "Satellite": satellite
        };
        // We pass 'null' for overlays here so this box ONLY handles basemaps
        L.control.layers(baseMaps, null, { collapsed: false }).addTo(map);

        // --- CONTROL BOX 2: Country Toggles ---
        // We pass 'null' for basemaps here so this box ONLY handles overlays (countries)
        L.control.layers(null, layers, { collapsed: false }).addTo(map);

    </script>
</body>
</html>
