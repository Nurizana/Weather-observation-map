name: Fetch NASA IMERG Data

on:
  schedule:
    - cron: '0 */3 * * *' # Runs automatically every 3 hours
  workflow_dispatch: # Allows you to click a button to run it manually

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python GIS Libraries
        # Added urllib3 explicitly to ensure the retry mechanisms we added work perfectly
        run: pip install requests urllib3 xarray netCDF4 h5netcdf h5py matplotlib numpy

      - name: Set up Earthdata Credentials (.netrc)
        # Creating a .netrc file ensures NASA's cross-domain redirects don't drop your authentication
        run: |
          echo "machine urs.earthdata.nasa.gov login ${{ secrets.EARTHDATA_USER }} password ${{ secrets.EARTHDATA_PASS }}" > ~/.netrc
          chmod 0600 ~/.netrc

      - name: Run NASA Download & Processing Script
        env:
          # Keep these in case your python script specifically calls them via os.environ
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}
        run: python update_imerg.py

      - name: Commit and Push Images to GitHub
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add imerg_*.png imerg_info.json
          git commit -m "Automated IMERG Satellite Animation Update" || echo "No changes to commit"
          git push
